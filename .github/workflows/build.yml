name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            label: windows-x64
          - os: windows-11-arm
            label: windows-arm64
          - os: macos-15-intel
            label: macos-x64
          - os: macos-15
            label: macos-arm64
          - os: ubuntu-24.04
            label: linux-x64
          - os: ubuntu-24.04-arm
            label: linux-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build installer
        run: >
          pyinstaller
          --onefile
          --name "install-carda-RealWings-${{ matrix.label }}"
          install_carda_RealWings.py

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: install-carda-RealWings-${{ matrix.label }}
          path: dist/install-carda-RealWings-${{ matrix.label }}*
